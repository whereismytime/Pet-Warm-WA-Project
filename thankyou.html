<!doctype html>
<html lang="en">
<head>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=Josefin+Sans:wght@100..700&display=swap" rel="stylesheet">

  <link rel="icon" href="img/logo/favicon.png">

  <!-- Base + page css -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/thankyou.css">

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank you — Pet Warm</title>
</head>

<body class="thankyou-page">
  <main class="thankyou-wrap">
    <section class="thankyou-card" aria-label="Thank you message">

      <img class="thankyou-logo"
           src="img/logo/pet.webp"
           alt="Pet Warm logo"
           width="180"
           height="180"
           loading="eager"
           decoding="async">

      <h1 class="thankyou-title">Thank you for contacting Pet Warm!</h1>

      <p class="thankyou-text">
        We’ve received your message. Please expect a reply to the email address you provided.
      </p>

      <div class="thankyou-info" aria-label="Reply time information">
        <p class="thankyou-line"><strong>Mon–Fri:</strong> reply within <strong>24 hours</strong>.</p>
        <p class="thankyou-line"><strong>Saturday:</strong> reply within <strong>48 hours</strong>.</p>
        <p class="thankyou-line"><strong>Sunday:</strong> replies start from <strong>Monday</strong>.</p>
      </div>

      <div class="thankyou-actions">
        <a class="btn btn-primary" href="index.html">Back to Home</a>
      </div>

      <p class="thankyou-note">Working hours: Mon–Sat, 9:00–18:00.</p>

    </section>
  </main>
</body>
</html>
